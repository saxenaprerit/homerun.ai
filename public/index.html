<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0F172A" />
  <title>Homerun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230F172A' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><path d='M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z'/></svg>" />
  <style>
    :root {
      /* Neutrals — slate */
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --surface-2: #F1F5F9;
      --ink: #0F172A;
      --ink-2: #334155;
      --muted: #64748B;
      --muted-2: #94A3B8;
      --line: #E2E8F0;
      --line-2: #EEF2F6;

      /* Brand — indigo, one accent used sparingly */
      --brand: #4F46E5;
      --brand-ink: #4338CA;
      --brand-soft: #EEF2FF;

      /* Semantic */
      --ok: #059669;
      --ok-soft: #ECFDF5;
      --warn: #D97706;
      --warn-soft: #FFFBEB;
      --danger: #DC2626;
      --danger-soft: #FEF2F2;

      --radius: 14px;
      --radius-sm: 10px;
      --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
      --shadow: 0 4px 12px -2px rgba(15,23,42,.08), 0 2px 6px -2px rgba(15,23,42,.05);
      --pad: clamp(16px, 3.5vw, 28px);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased;
      letter-spacing: -0.006em;
    }
    button { font-family: inherit; cursor: pointer; border: 0; background: none; }
    input, select { font-family: inherit; font-size: 15px; color: var(--ink); }
    ::placeholder { color: var(--muted-2); }

    /* ── Top bar ─────────────────────────────────────────── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      padding: calc(env(safe-area-inset-top, 0px) + 14px) var(--pad) 14px;
    }
    .topbar .brand { display: flex; align-items: center; gap: 10px; }
    .topbar .logo {
      width: 34px; height: 34px; border-radius: 9px;
      background: var(--ink); color: #fff;
      display: flex; align-items: center; justify-content: center; flex: 0 0 auto;
    }
    .topbar h1 { margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
    .topbar .sub { font-size: 12.5px; color: var(--muted); margin-top: 1px; font-weight: 450; }

    /* ── Tabs (segmented) ────────────────────────────────── */
    .tabsWrap { position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 1px solid var(--line); }
    .tabs {
      display: flex; gap: 4px; max-width: 1120px; margin: 0 auto;
      padding: 10px var(--pad); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 0 0 auto; min-height: 40px;
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px; border-radius: 9px;
      color: var(--muted); font-weight: 550; font-size: 14px;
      transition: background .12s, color .12s;
    }
    .tab:hover { color: var(--ink-2); background: var(--surface-2); }
    .tab[aria-selected="true"] { background: var(--ink); color: #fff; }
    .tab[aria-selected="true"] .count { background: rgba(255,255,255,.22); color: #fff; }
    .tab .count {
      font-size: 11.5px; font-weight: 600; padding: 1px 7px; border-radius: 999px;
      background: var(--surface-2); color: var(--muted);
    }

    /* ── Layout ──────────────────────────────────────────── */
    .container { max-width: 1120px; margin: 0 auto; padding: 20px var(--pad) 48px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }

    /* ── Tile ────────────────────────────────────────────── */
    .tile {
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 18px; display: flex; flex-direction: column; gap: 14px;
      min-height: 260px;
    }
    .tile-head { display: flex; align-items: center; gap: 10px; }
    .tile-head .ic {
      width: 32px; height: 32px; border-radius: 8px; flex: 0 0 auto;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-2); color: var(--ink-2);
    }
    .tile-head h2 { margin: 0; font-size: 15px; font-weight: 650; letter-spacing: -0.01em; }
    .tile-head .head-meta { margin-left: auto; font-size: 12.5px; color: var(--muted); font-weight: 500; }

    .section-label {
      font-size: 11px; font-weight: 600; color: var(--muted-2);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px;
    }

    /* ── Forms ───────────────────────────────────────────── */
    .formRow { display: flex; gap: 8px; }
    .formRow input, .formRow select {
      flex: 1; min-width: 0; height: 40px;
      padding: 0 12px; border: 1px solid var(--line); border-radius: var(--radius-sm);
      background: var(--surface); transition: border-color .12s, box-shadow .12s;
    }
    .formRow input:focus, .formRow select:focus {
      outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft);
    }
    .btn {
      height: 40px; padding: 0 16px; border-radius: var(--radius-sm);
      background: var(--ink); color: #fff; font-weight: 550; font-size: 14px; white-space: nowrap;
      transition: opacity .12s, background .12s;
    }
    .btn:hover { background: #1E293B; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-ghost { background: var(--surface-2); color: var(--ink-2); }
    .btn-ghost:hover { background: var(--line); }

    /* ── Lists ───────────────────────────────────────────── */
    ul.list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; }
    ul.list li {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 2px; border-bottom: 1px solid var(--line-2); min-height: 44px;
    }
    ul.list li:last-child { border-bottom: 0; }
    ul.list li.done .name { text-decoration: line-through; color: var(--muted-2); }
    ul.list .name { flex: 1; min-width: 0; font-weight: 500; word-break: break-word; }
    ul.list .qty { color: var(--muted); font-size: 13px; font-weight: 450; }
    ul.list .meta { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
    ul.list .del {
      color: var(--muted-2); padding: 6px; width: 30px; height: 30px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center; flex: 0 0 auto;
    }
    ul.list .del:hover { color: var(--danger); background: var(--danger-soft); }

    /* Custom checkbox */
    .check {
      appearance: none; -webkit-appearance: none;
      width: 20px; height: 20px; flex: 0 0 auto;
      border: 1.5px solid var(--line); border-radius: 6px; background: var(--surface);
      cursor: pointer; position: relative; transition: background .12s, border-color .12s;
    }
    .check:checked { background: var(--brand); border-color: var(--brand); }
    .check:checked::after {
      content: ""; position: absolute; left: 6px; top: 2.5px;
      width: 5px; height: 10px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg);
    }

    /* ── Badges ──────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; font-size: 11.5px; font-weight: 600;
      padding: 2px 9px; border-radius: 999px; white-space: nowrap; font-variant-numeric: tabular-nums;
      background: var(--surface-2); color: var(--muted);
    }
    .badge.ok { background: var(--ok-soft); color: var(--ok); }
    .badge.warn { background: var(--warn-soft); color: var(--warn); }
    .badge.danger { background: var(--danger-soft); color: var(--danger); }
    .badge.brand { background: var(--brand-soft); color: var(--brand-ink); }
    .tag {
      display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600;
      padding: 1px 7px; border-radius: 6px; background: var(--surface-2); color: var(--muted);
      text-transform: uppercase; letter-spacing: .03em;
    }

    /* ── Finances summary ────────────────────────────────── */
    .total-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
    .total { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
    .total-sub { font-size: 12.5px; color: var(--muted); }
    .catbar { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13px; }
    .catbar .cname { min-width: 74px; color: var(--ink-2); font-weight: 500; text-transform: capitalize; }
    .catbar .track { flex: 1; height: 7px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
    .catbar .fill { height: 100%; border-radius: 999px; background: var(--brand); }
    .catbar .cval { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 62px; text-align: right; }

    /* ── Movie ───────────────────────────────────────────── */
    .movie-card {
      border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden;
    }
    .movie-poster {
      background: linear-gradient(135deg, #1E1B4B 0%, #4F46E5 100%);
      color: #fff; padding: 18px; position: relative;
    }
    .movie-poster .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; opacity: .8; }
    .movie-poster .mtitle { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin-top: 4px; line-height: 1.2; }
    .movie-poster .mmeta { font-size: 12.5px; opacity: .82; margin-top: 6px; font-variant-numeric: tabular-nums; }
    .movie-why { padding: 13px 15px; background: var(--surface); font-size: 13.5px; color: var(--ink-2); line-height: 1.5; }
    .movie-why b { color: var(--ink); font-weight: 600; }

    /* ── Calendar ────────────────────────────────────────── */
    .day-label { font-size: 11.5px; font-weight: 600; color: var(--muted-2); text-transform: uppercase; letter-spacing: .05em; padding: 12px 0 4px; }
    .ev-type {
      width: 30px; height: 30px; border-radius: 8px; flex: 0 0 auto;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-2); color: var(--ink-2);
    }

    /* ── States ──────────────────────────────────────────── */
    .empty { color: var(--muted); padding: 14px 0; font-size: 13.5px; text-align: center; }
    .err {
      color: var(--danger); padding: 10px 12px; font-size: 13px; border-radius: var(--radius-sm);
      background: var(--danger-soft); display: flex; align-items: center; gap: 10px;
    }
    .err button { margin-left: auto; padding: 4px 10px; border: 1px solid currentColor; color: var(--danger); border-radius: 7px; font-size: 12.5px; font-weight: 550; }

    details { border-top: 1px solid var(--line-2); padding-top: 4px; }
    details summary {
      cursor: pointer; color: var(--muted); font-size: 13px; font-weight: 500;
      padding: 8px 0; list-style: none; display: flex; align-items: center; gap: 6px; min-height: 40px;
    }
    details summary::-webkit-details-marker { display: none; }
    details summary::before { content: "+"; font-size: 15px; color: var(--muted-2); width: 14px; }
    details[open] summary::before { content: "\2013"; }
    details[open] summary { color: var(--ink-2); }

    .footer { text-align: center; color: var(--muted-2); font-size: 12px; padding: 28px 0 calc(env(safe-area-inset-bottom, 0px) + 16px); }

    .skeleton { background: linear-gradient(90deg, var(--surface-2) 25%, var(--line-2) 37%, var(--surface-2) 63%); background-size: 400% 100%; animation: shimmer 1.4s ease infinite; border-radius: var(--radius-sm); height: 44px; }
    @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

    /* ── Floating voice mic ──────────────────────────── */
    .mic-wrap { position: fixed; right: calc(env(safe-area-inset-right,0px) + 20px); bottom: calc(env(safe-area-inset-bottom,0px) + 20px); z-index: 50; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
    .mic-btn {
      width: 60px; height: 60px; border-radius: 50%; flex: 0 0 auto;
      background: var(--brand); color: #fff; box-shadow: var(--shadow);
      display: flex; align-items: center; justify-content: center;
      transition: transform .12s, background .12s;
    }
    .mic-btn svg { width: 26px; height: 26px; }
    .mic-btn:hover { background: var(--brand-ink); transform: translateY(-1px); }
    .mic-btn:disabled { cursor: default; }
    .mic-btn.recording { background: var(--danger); animation: micpulse 1.2s ease-in-out infinite; }
    @keyframes micpulse { 0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,.45); } 50% { box-shadow: 0 0 0 12px rgba(220,38,38,0); } }
    .mic-hint { font-size: 12px; font-weight: 600; color: var(--danger); background: var(--surface); border: 1px solid var(--line); padding: 5px 11px; border-radius: 999px; box-shadow: var(--shadow-sm); }
    .mic-spin { width: 22px; height: 22px; border-radius: 50%; border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff; animation: micspin .7s linear infinite; }
    @keyframes micspin { to { transform: rotate(360deg); } }
    .mic-panel {
      position: relative; max-width: min(320px, 78vw);
      background: var(--surface); border: 1px solid var(--line); border-left: 3px solid var(--brand);
      border-radius: var(--radius-sm); box-shadow: var(--shadow); padding: 12px 34px 12px 14px;
    }
    .mic-panel.bad { border-left-color: var(--danger); }
    .mic-panel .mic-heard { font-size: 12.5px; color: var(--muted); font-style: italic; margin-bottom: 4px; }
    .mic-panel .mic-reply { font-size: 14px; font-weight: 550; color: var(--ink); line-height: 1.4; }
    .mic-panel .mic-dismiss { position: absolute; top: 7px; right: 8px; color: var(--muted-2); font-size: 13px; width: 22px; height: 22px; border-radius: 6px; }
    .mic-panel .mic-dismiss:hover { color: var(--ink); background: var(--surface-2); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./client.js"></script>
</body>
</html>
